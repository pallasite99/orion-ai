name: Vercel Preview Deployment

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy:
    name: Build and deploy preview to Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify Vercel credentials
        shell: pwsh
        run: |
          if (-not $env:VERCEL_TOKEN) { throw "Set the VERCEL_TOKEN repository secret." }
          if (-not $env:VERCEL_ORG_ID) { throw "Set the VERCEL_ORG_ID repository secret." }
          if (-not $env:VERCEL_PROJECT_ID) { throw "Set the VERCEL_PROJECT_ID repository secret." }

      - name: Deploy project artifacts
        run: vercel deploy --token="$VERCEL_TOKEN"
