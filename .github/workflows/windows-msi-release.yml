name: Windows MSI Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and upload MSI
    runs-on: windows-latest
    env:
      ORION_TAURI_FRONTEND_URL: ${{ vars.ORION_TAURI_FRONTEND_URL || 'https://orion-ai.vercel.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Refresh Tauri config
        run: npm run tauri:prepare

      - name: Build MSI
        run: npm run tauri:build

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
